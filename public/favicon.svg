<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <style>
    @media (prefers-color-scheme: light) {
      .icon-bg { fill: #f8f9fc; }
      .icon-stroke { stroke: #111827; }
    }

    @media (prefers-color-scheme: dark) {
      .icon-bg { fill: #050505; }
      .icon-stroke { stroke: #f5f7fb; }
    }
  </style>
  <rect class="icon-bg" width="512" height="512" rx="96" fill="#050505"/>
  <g transform="translate(80, 80)">
    <circle class="icon-stroke" cx="176" cy="176" r="164" fill="none" stroke="#ffffff" stroke-width="2.8" opacity="0.1"/>
    <polyline
      class="icon-stroke"
      points="12,176 96,176 130,80 166,260 202,130 224,212 250,176 340,176"
      fill="none"
      stroke="#ffffff"
      stroke-width="4"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.95"
    />
  </g>
</svg>
